<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lokalrådet Ferritslev-Rolfsted</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Sikrer at siden fylder 100% af skærmhøjden uden scroll-bar */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            line-height: 1.5; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; /* Perfekt lodret centrering */
            background-image: url('Luftfoto-Ferritslev-Maj-2024.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1c1e21; 
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .card { 
            width: 90%; /* Responsive bredde på mobil */
            max-width: 550px; 
            background: rgba(255, 255, 255, 0.25); 
            padding: 30px 20px; 
            border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
            margin: 20px; /* Sikrer luft omkring kortet på små skærme */
        }

        .logo {
            max-width: 260px;
            width: 80%; /* Skalerer logoet på mobil */
            height: auto;
            margin-bottom: 15px;
        }

        p.intro { 
            font-size: 1rem; 
            font-weight: 600; 
            margin: 0 0 25px 0; 
            padding: 0 10px;
        }
        
        .contact-section {
            margin: 25px 0;
        }

        h2.contact-header {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .spacer {
            width: 40px;
            height: 3px;
            background-color: #1c1e21;
            margin: 0 auto 15px auto;
            border-radius: 2px;
        }

        .emails {
            font-size: 1rem;
            font-weight: 600;
        }

        .emails a {
            display: block;
            color: #1c1e21; 
            text-decoration: none;
            margin: 8px 0;
            word-break: break-all; /* Forhindrer lange mails i at ødelægge layout på smalle skærme */
        }

        .btn-fb { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            background-color: #1877F2; 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 1rem; 
            transition: transform 0.2s;
            margin-top: 15px;
            width: auto;
            max-width: 100%;
        }

        /* Facebook logo størrelse og optimering */
        .btn-fb img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .footer { 
            margin-top: 30px; 
            font-size: 0.75rem; 
            font-weight: 600;
            opacity: 0.8;
        }

        /* Mobil-specifikke justeringer */
        @media (max-width: 480px) {
            .card { padding: 25px 15px; }
            .logo { max-width: 200px; }
            .btn-fb { padding: 10px 20px; font-size: 0.9rem; }
            .btn-fb img { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="visually-hidden">Lokalrådet Ferritslev-Rolfsted</h1>
        
        <img src="lokalraadet-f-r-logo.svg" alt="Ferritslev-Rolfsted Lokalråd Logo" class="logo">
        
        <p class="intro">Vi arbejder for udvikling og fællesskab i vores lokalområde.</p>

        <div class="contact-section">
            <h2 class="contact-header">Kontakt</h2>
            <div class="spacer"></div>
            <div class="emails">
                <a href="mailto:formand@ferritslev-rolfsted.dk">formand@ferritslev-rolfsted.dk</a>
                <a href="mailto:kasserer@ferritslev-rolfsted.dk">kasserer@ferritslev-rolfsted.dk</a>
            </div>
        </div>

        <a href="https://www.facebook.com/lokalraaredet.ferritslev.rolfsted" class="btn-fb" target="_blank">
            <img src="Facebook-Logo-round.svg" alt="Facebook logo">
            Følg med på Facebook
        </a>
        
        <div class="footer">
            &copy; 2026 Lokalrådet Ferritslev-Rolfsted
        </div>
    </div>
</body>
</html>
