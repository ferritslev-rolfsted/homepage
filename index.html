<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokalrådet Ferritslev-Rolfsted</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            line-height: 1.6; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            background-image: url('Luftfoto-Ferritslev-Maj-2024.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1c1e21; 
        }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        .card { 
            max-width: 600px; 
            margin: 60px auto; 
            /* Frosted glass: 25% gennemsigtighed */
            background: rgba(255, 255, 255, 0.25); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 20px;
        }
        p.intro { font-size: 1.1em; font-weight: 600; margin-bottom: 30px; }
        
        .contact-section {
            margin: 30px 0;
        }
        h2.contact-header {
            font-size: 1.4em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .emails {
            font-size: 1.1em;
            font-weight: 600;
        }
        .emails a {
            display: block;
            color: #007bff;
            text-decoration: none;
            margin: 5px 0;
        }
        .emails a:hover { text-decoration: underline; }

        .btn-fb { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            background-color: #1877F2; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.1em; 
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
        }
        .btn-fb:hover { 
            background-color: #166fe5;
            transform: scale(1.02);
        }
        /* Facebook logo dobbelt størrelse */
        .btn-fb img {
            width: 60px;
            height: 60px;
            margin-right: 15px;
        }
        .footer { margin-top: 40px; font-size: 0.85em; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="visually-hidden">Lokalrådet Ferritslev-Rolfsted</h1>
        
        <img src="lokalraadet-f-r-logo.svg" alt="Ferritslev-Rolfsted Lokalråd Logo" class="logo">
        
        <p class="intro">Vi arbejder for udvikling og fællesskab i vores lokalområde.</p>

        <div class="contact-section">
            <h2 class="contact-header">Kontakt</h2>
            <div class="emails">
                <a href="mailto:formand@ferritslev-rolfsted.dk">formand@ferritslev-rolfsted.dk</a>
                <a href="mailto:kasserer@ferritslev-rolfsted.dk">kasserer@ferritslev-rolfsted.dk</a>
            </div>
        </div>

        <a href="https://www.facebook.com/lokalraaredet.ferritslev.rolfsted" class="btn-fb" target="_blank">
            <img src="Facebook-Logo-round.svg" alt="Facebook logo">
            Følg med på facebook
        </a>
        
        <div class="footer">
            &copy; 2026 Lokalrådet Ferritslev-Rolfsted
        </div>
    </div>
</body>
</html>
