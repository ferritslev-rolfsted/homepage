<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokalrådet Ferritslev-Rolfsted</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            /* Luftfoto som baggrund */
            background-image: url('Luftfoto-Ferritslev-Maj-2024.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #1c1e21; 
        }
        /* Skjult H1 til SEO */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
        .card { 
            max-width: 600px; 
            margin: 60px auto; 
            /* 40% transparent hvid boks (60% opacity) */
            background: rgba(255, 255, 255, 0.6); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px); /* Giver en lækker glas-effekt */
        }
        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }
        p { font-size: 1.1em; color: #1c1e21; font-weight: 500; margin-bottom: 30px; }
        .contact-box { background: rgba(247, 248, 2fa, 0.7); padding: 20px; border-radius: 8px; margin: 25px 0; text-align: left; border: 1px solid #e4e6eb; }
        .contact-item { margin: 10px 0; font-weight: 600; }
        .contact-item a { color: #007bff; text-decoration: none; }
        .btn-fb { 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            background-color: #1877F2; 
            color: white; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 1.1em; 
            transition: background 0.2s; 
        }
        .btn-fb:hover { background-color: #166fe5; }
        .btn-fb img {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }
        .footer { margin-top: 40px; font-size: 0.9em; color: #1c1e21; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="visually-hidden">Ferritslev-Rolfsted Lokalråd - Udvikling og fællesskab i Ferritslev og Rolfsted</h1>
        
        <img src="lokalraadet-f-r-logo.svg" alt="Ferritslev-Rolfsted Lokalråd Logo" class="logo">
        
        <p>Vi arbejder for udvikling og fællesskab i vores lokalområde.</p>

        <div class="contact-box">
            <div class="contact-item">Formand: <a href="mailto:formand@ferritslev-rolfsted.dk">formand@ferritslev-rolfsted.dk</a></div>
            <div class="contact-item">Kasserer: <a href="mailto:kasserer@ferritslev-rolfsted.dk">kasserer@ferritslev-rolfsted.dk</a></div>
        </div>

        <a href="https://www.facebook.com/lokalraaredet.ferritslev.rolfsted" class="btn-fb" target="_blank">
            <img src="Facebook-Logo-round.svg" alt="Facebook logo">
            Besøg os på Facebook
        </a>
        
        <div class="footer">
            &copy; 2026 Lokalrådet Ferritslev-Rolfsted
        </div>
    </div>
</body>
</html>
