<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferritslev-Rolfsted Lokalråd</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; text-align: center; padding: 40px 20px; background-color: #f0f2f5; color: #1c1e21; }
        .card { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h1 { color: #050505; font-size: 2em; margin-bottom: 10px; }
        p { font-size: 1.1em; color: #65676b; margin-bottom: 30px; }
        .contact-box { background: #f7f8fa; padding: 20px; border-radius: 8px; margin: 25px 0; text-align: left; border: 1px solid #e4e6eb; }
        .contact-item { margin: 10px 0; font-weight: 500; }
        .contact-item a { color: #007bff; text-decoration: none; }
        .btn-fb { display: inline-block; background-color: #1877F2; color: white; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 1.1em; transition: background 0.2s; }
        .btn-fb:hover { background-color: #166fe5; }
        .footer { margin-top: 40px; font-size: 0.9em; color: #8a8d91; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ferritslev-Rolfsted Lokalråd</h1>
        <p>Vi arbejder for udvikling og fællesskab i vores lokalområde.</p>

        <div class="contact-box">
            <div class="contact-item">Formand: <a href="mailto:formand@ferritslev-rolfsted.dk">formand@ferritslev-rolfsted.dk</a></div>
            <div class="contact-item">Kasserer: <a href="mailto:kasserer@ferritslev-rolfsted.dk">kasserer@ferritslev-rolfsted.dk</a></div>
        </div>

        <a href="https://www.facebook.com/lokalraaredet.ferritslev.rolfsted" class="btn-fb" target="_blank">Besøg os på Facebook</a>
        
        <div class="footer">
            &copy; 2026 Lokalrådet Ferritslev-Rolfsted
        </div>
    </div>
</body>
</html>
